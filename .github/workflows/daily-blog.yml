name: Daily Blog Post

# Runs at 13:00 UTC daily, which is 9am EDT / 8am EST — GitHub Actions cron
# does not shift for daylight saving, so the local time drifts by an hour
# for the ~4 winter months (EST). Adjust to 14:00 UTC if 9am EST matters
# more to you than 9am EDT.
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.js

      - name: Commit and push new post
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add daily blog post"
          file_pattern: "blog/*.html sitemap.xml"
